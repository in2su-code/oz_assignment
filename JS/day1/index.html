<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>사칙연산 계산기</title>

    <script src="calculator.js"></script>
</head>

<body>

    <h1>🧮 콘솔 계산기 프로그램</h1>

    <h3>Windows</h3>
    <hr>

    <p>1. F12를 눌러 개발자 도구를 엽니다.</p>
    <p>2. Console 탭으로 이동합니다.</p>
    <p>3. <strong>start()</strong> 를 입력하면 계산기가 실행됩니다.</p>

    <h3>Mac</h3>
    <hr>

    <p>1. Option + Command + I 를 누릅니다.</p>
    <p>2. Console 탭으로 이동합니다.</p>
    <p>3. <strong>start()</strong> 를 입력하면 계산기가 실행됩니다.</p>

</body>

</html>
